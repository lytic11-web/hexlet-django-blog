{% extends "base.html" %}

{% block content %}
    <h1>Список статей</h1>
    <p><a href="{% url 'articles_create' %}">Создать статью</a></p>
    
    {% for article in articles %}
        <h2><a href="{% url 'article' id=article.id %}">{{ article.name }}</a></h2>
        <div>{{ article.body|slice:":200" }}</div>
        <p><a href="{% url 'articles_update' id=article.id %}">Редактировать</a></p>
    {% endfor %}
{% endblock %}
